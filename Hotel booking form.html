<!DOCTYPE html>
<html>
<head>
<title>Hotel Booking Form</title>
</head>

<body>

<h2>Hotel Booking Form</h2>

<form id="bookingForm">

<label>Name:</label><br>
<input type="text" id="name" name="name" required><br><br>

<label>Email:</label><br>
<input type="email" name="email" required><br><br>

<label>Phone:</label><br>
<input type="text" id="phone" name="phone" required><br><br>

<label>Room Type:</label><br>
<select name="room">
<option value="Single">Single</option>
<option value="Double">Double</option>
<option value="Deluxe">Deluxe</option>
</select><br><br>

<label>Check-in Date:</label><br>
<input type="date" name="checkin"><br><br>

<label>Check-out Date:</label><br>
<input type="date" name="checkout"><br><br>

<input type="submit" value="Book Now">

</form>

<script>

const scriptURL = "https://script.google.com/macros/s/AKfycbxGEPNC4NfVVB9vsMWhN1lKboW9mQgr2mriedeCP7OfSihtBEJrPWiVBWymSW4-xPKX/exec";

document.getElementById("bookingForm").addEventListener("submit", function(e){

e.preventDefault();

var name = document.getElementById("name").value;
var phone = document.getElementById("phone").value;

fetch(scriptURL,{
method:"POST",
mode:"no-cors",
body:new FormData(this)
});

alert("Booking Saved Successfully");

var adminNumber = "918667358514";   // ← உன் WhatsApp number போடு

var message = "New Hotel Booking%0AName: "+name+"%0APhone: "+phone;

var whatsappLink = "https://wa.me/"+adminNumber+"?text="+message;

window.open(whatsappLink);

this.reset();

});

</script>

</body>
</html>
